<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista Spesa</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#22223b;
      --accent:#e63946;--accent2:#f4a261;--text:#f1faee;
      --muted:#8d99ae;--green:#2a9d8f;--radius:14px;
      --shadow:0 8px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{overflow-x:hidden;width:100%}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px 16px 60px}
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    #login-screen h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:800;background:linear-gradient(135deg,var(--text) 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    #login-screen>p{color:var(--muted);margin-bottom:40px;font-size:.95rem}
    .login-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 32px;text-align:center;max-width:360px;width:100%}
    .login-card h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:8px}
    .login-card p{color:var(--muted);font-size:.88rem;margin-bottom:28px}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px;background:#fff;color:#333;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;transition:opacity .2s}
    .btn-google:hover{opacity:.9}
    .btn-google img{width:20px;height:20px}
    #login-error{margin-top:16px;color:var(--accent);font-size:.85rem;min-height:20px}
    #app-screen{display:none}
    header{text-align:center;margin-bottom:32px}
    header h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--text) 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    header p{color:var(--muted);font-size:.9rem;margin-top:6px}
    .user-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;font-size:.85rem;color:var(--muted)}
    .user-bar img{width:28px;height:28px;border-radius:50%;border:2px solid var(--accent2)}
    .btn-logout{background:none;border:1.5px solid var(--muted);color:var(--muted);border-radius:6px;padding:3px 10px;font-size:.78rem;cursor:pointer;transition:border-color .2s,color .2s}
    .btn-logout:hover{border-color:var(--accent);color:var(--accent)}
    .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;max-width:600px;margin:0 auto 28px}
    .card h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent2);margin-bottom:18px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.78rem;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
    .field input,.field select{width:100%;background:var(--surface2);border:1.5px solid transparent;border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .2s;outline:none;appearance:none}
    .field select option{background:var(--surface2)}
    .field input:focus,.field select:focus{border-color:var(--accent2)}
    .field input::placeholder{color:var(--muted)}
    .btn-add{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:6px;transition:opacity .2s,transform .1s}
    .btn-add:hover{opacity:.88}
    .btn-add:active{transform:scale(.98)}
    .btn-add:disabled{opacity:.5;cursor:not-allowed}
    #status{max-width:600px;margin:0 auto 14px;text-align:center;font-size:.88rem;min-height:20px;color:var(--accent2)}
    .cat-header td{background:var(--surface2);color:var(--accent2);font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:8px 12px}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;min-width:0;border-collapse:collapse;font-size:.9rem}
    thead tr{border-bottom:2px solid var(--surface2)}
    thead th{padding:10px 12px;text-align:left;font-family:'Syne',sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
    tbody tr{border-bottom:1px solid var(--surface2);transition:background .15s}
    tbody tr:hover{background:var(--surface2)}
    tbody td{padding:12px;vertical-align:middle}
    .badge-qty{display:inline-block;background:var(--accent2);color:#1a1a2e;font-weight:700;font-size:.8rem;border-radius:20px;padding:2px 10px}
    .badge-loc{display:inline-block;background:var(--surface2);color:var(--muted);font-size:.8rem;border-radius:6px;padding:3px 9px}
    tr.acquistato td{opacity:.45}
    tr.acquistato .nome-prodotto{text-decoration:line-through;color:var(--muted)}
    tr.acquistato .badge-qty{background:var(--muted)}
    .btn-check{background:none;border:1.5px solid var(--green);color:var(--green);border-radius:6px;padding:5px 10px;font-size:.8rem;font-weight:700;cursor:pointer;transition:background .15s,color .15s;margin-right:6px}
    .btn-check:hover{background:var(--green);color:#fff}
    tr.acquistato .btn-check{border-color:var(--muted);color:var(--muted)}
    .btn-del{background:none;border:1.5px solid var(--accent);color:var(--accent);border-radius:6px;padding:5px 10px;font-size:.8rem;font-weight:700;cursor:pointer;transition:background .15s,color .15s;margin-left:6px}
    .btn-del:hover{background:var(--accent);color:#fff}
    .empty-row td{text-align:center;color:var(--muted);padding:28px;font-style:italic}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--muted);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .counter{text-align:right;font-size:.8rem;color:var(--muted);margin-bottom:12px}
    .counter span{color:var(--accent2);font-weight:700}
    #install-banner{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1.5px solid var(--accent2);border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow);align-items:center;gap:14px;max-width:340px;width:calc(100% - 32px);z-index:999}
    #install-banner p{font-size:.88rem;flex:1}
    #install-banner button{background:var(--accent2);color:#1a1a2e;border:none;border-radius:6px;padding:7px 14px;font-weight:700;cursor:pointer;font-size:.85rem;white-space:nowrap}
    #dismiss-install{background:none!important;color:var(--muted)!important;padding:0!important;font-size:1.2rem!important}
    @media(max-width:480px){
      body{padding:16px 8px 60px}
      .card{padding:16px}
      thead th,tbody td{padding:8px 6px;font-size:.8rem}
      .btn-check,.btn-del{display:block;width:100%;margin:3px 0}
    }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>🛒 Lista Spesa</h1>
  <p>Famiglia · sincronizzata in tempo reale</p>
  <div class="login-card">
    <h2>Benvenuto!</h2>
    <p>Accedi con il tuo account Google per entrare nella lista di famiglia</p>
    <button class="btn-google" onclick="loginGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Accedi con Google
    </button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <header>
    <h1>🛒 Lista Spesa</h1>
    <p>Famiglia · sincronizzata in tempo reale</p>
    <div class="user-bar">
      <img id="user-photo" src="" alt="" style="display:none" />
      <span id="user-name"></span>
      <button class="btn-logout" onclick="logout()">Esci</button>
    </div>
  </header>

  <div class="card">
    <h2>➕ Nuovo prodotto</h2>
    <div class="field"><label for="nome">Nome prodotto</label><input id="nome" type="text" placeholder="es. Latte, Pasta…" autocomplete="off" /></div>
    <div class="field"><label for="quantita">Quantità</label><input id="quantita" type="number" min="1" placeholder="1" /></div>
    <div class="field"><label for="ubicazione">Ubicazione</label><input id="ubicazione" type="text" placeholder="es. Frigo, Dispensa…" autocomplete="off" /></div>
    <div class="field">
      <label for="categoria">Categoria</label>
      <select id="categoria">
        <option value="Frutta e Verdura">🥦 Frutta e Verdura</option>
        <option value="Carne e Pesce">🥩 Carne e Pesce</option>
        <option value="Latticini">🧀 Latticini</option>
        <option value="Pane e Dolci">🍞 Pane e Dolci</option>
        <option value="Bevande">🥤 Bevande</option>
        <option value="Pulizia Casa">🧹 Pulizia Casa</option>
        <option value="Igiene Personale">🧴 Igiene Personale</option>
        <option value="Altro">📦 Altro</option>
      </select>
    </div>
    <button class="btn-add" id="btn-aggiungi" onclick="aggiungiProdotto()">Aggiungi Prodotto</button>
  </div>

  <div id="status"></div>

  <div class="card">
    <h2>📋 Prodotti</h2>
    <div class="counter" id="counter"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nome</th><th>Q.tà</th><th>Ubicazione</th><th>Azioni</th></tr></thead>
        <tbody id="tabella-prodotti">
          <tr class="empty-row"><td colspan="4"><span class="spinner"></span> Caricamento…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="install-banner">
  <p>📲 Installa l'app sul tuo dispositivo</p>
  <button id="btn-install">Installa</button>
  <button id="dismiss-install">✕</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</body>
</html>
